  .search-bar{padding:10px 20px;background:var(--dark)}

  .search-bar input:focus{border-color:var(--accent)}
  .search-bar input::placeholder{color:var(--gray)}
  .grid-wrap{padding:12px 20px 100px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .card{background:var(--card);border:2px solid #2A3F54;border-radius:14px;padding:14px 12px 12px;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden}

  .card.selected{border-color:var(--accent);box-shadow:0 0 14px rgba(0,201,167,.25)}
  .card-top-accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s}
  .card.selected .card-top-accent{transform:scaleX(1)}
  .card-emoji{font-size:32px;margin-bottom:6px;display:block;text-align:center}
  .card-name{font-weight:700;font-size:13px;color:var(--white);line-height:1.3;margin-bottom:8px;min-height:34px}
  .card-price{color:var(--accent);font-family:'Nunito',sans-serif;font-weight:900;font-size:16px}
  .card-price small{font-size:10px;color:var(--gray);font-weight:600}

  .qty-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:16px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .1s}

  .ci-emoji{font-size:24px;flex-shrink:0}

</head>

let cart={},currentCat='all',searchQuery='';
let orderNum = Math.floor(Math.random()*900)+100;

function fmt(n){return n.toLocaleString('uz-UZ').replace(/,/g,' ')+" so'm"}

function renderGrid(){
  const wrap=document.getElementById('gridWrap');
  let filtered=products.filter(p=>{
    const matchCat=currentCat==='all'||p.cat===currentCat;
    const matchSearch=p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat&&matchSearch;
  });
  if(filtered.length===0){wrap.innerHTML=`<div style="text-align:center;padding:50px;color:var(--gray)"><div style="font-size:48px">🔍</div><p style="margin-top:12px">Mahsulot topilmadi</p></div>`;return}
  wrap.innerHTML=`<div class="grid">${filtered.map(p=>cardHTML(p)).join('')}</div>`;
}

function cardHTML(p){
  const inCart=cart[p.id]||0;
  const sel=inCart>0?'selected':'';
  return `<div class="card ${sel}" id="card-${p.id}"><div class="card-top-accent"></div><span class="card-emoji">${p.emoji}</span><div class="card-name">${p.name}</div><div class="card-price">${(p.price/1000).toFixed(1)}K <small>so'm</small></div><div class="qty-row"><button class="qty-btn qty-minus" onclick="changeQty(${p.id},-1)">−</button><input class="qty-val" id="qty-${p.id}" type="number" min="0" value="${inCart}" onchange="setQty(${p.id},this.value)" onclick="this.select()"><button class="qty-btn qty-plus" onclick="changeQty(${p.id},1)">+</button></div><button class="add-btn ${inCart>0?'added':''}" onclick="addToCart(${p.id})" id="abtn-${p.id}">${inCart>0?"✅ Korzinkada":"🛒 Qo'shish"}</button></div>`;
}

function changeQty(id,delta){const current=cart[id]||0;const newVal=Math.max(0,current+delta);if(newVal===0)delete cart[id];else cart[id]=newVal;updateCardUI(id);updateCartUI()}
function setQty(id,val){const n=parseInt(val)||0;if(n<=0)delete cart[id];else cart[id]=n;updateCardUI(id);updateCartUI()}
function addToCart(id){if(!cart[id])cart[id]=1;updateCardUI(id);updateCartUI();showToast("✅ Korzinkaga qo'shildi!")}

function updateCardUI(id){
  const qty=cart[id]||0;
  const qtyEl=document.getElementById(`qty-${id}`);
  const btnEl=document.getElementById(`abtn-${id}`);
  const card=document.getElementById(`card-${id}`);
  if(qtyEl)qtyEl.value=qty;
  if(btnEl){btnEl.textContent=qty>0?"✅ Korzinkada":"🛒 Qo'shish";btnEl.className='add-btn '+(qty>0?'added':'')}
  if(card)card.classList.toggle('selected',qty>0);
}

function updateCartUI(){
  const items=cartItems();
  const count=items.reduce((s,i)=>s+i.qty,0);
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  document.getElementById('cartBadge').textContent=count;
  document.getElementById('cartTotal').textContent=fmt(total);
  document.getElementById('topTotal').textContent=count>0?fmt(total):"0 so'm";
  renderCartItems(items);
}

function cartItems(){return Object.entries(cart).map(([id,qty])=>{const p=products.find(x=>x.id===+id);return{...p,qty,subtotal:p.price*qty}})}

function renderCartItems(items){
  const el=document.getElementById('cartItems');
  if(items.length===0){el.innerHTML=`<div class="cart-empty"><div class="big">🛒</div>Korzinka bo'sh</div>`;return}
  el.innerHTML=items.map(item=>`<div class="cart-item"><span class="ci-emoji">${item.emoji}</span><div class="ci-info"><div class="ci-name">${item.name}</div><div class="ci-price-row"><div class="ci-qty-wrap"><button class="ci-qbtn minus" onclick="changeQty(${item.id},-1)">−</button><span class="ci-qty">${item.qty}</span><button class="ci-qbtn plus" onclick="changeQty(${item.id},1)">+</button></div><span style="font-size:11px;color:var(--gray);margin-left:4px">× ${(item.price/1000).toFixed(1)}K</span></div></div><div style="text-align:right"><div class="ci-subtotal">${fmt(item.subtotal)}</div></div><button class="ci-del" onclick="removeItem(${item.id})">✕</button></div>`).join('');
}

function removeItem(id){delete cart[id];updateCardUI(id);updateCartUI()}

function clearCart(){
  if(!confirm('Korzinkani tozalaysizmi?'))return;
  Object.keys(cart).forEach(id=>{delete cart[id];updateCardUI(+id)});
  cart={};updateCartUI();
}

function openCart(){document.getElementById('cartOverlay').classList.add('open')}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open')}
function closeCartOnBg(e){if(e.target.id==='cartOverlay')closeCart()}

async function sendToTelegram(){
  const items=cartItems();
  if(items.length===0){showToast("Korzinka bo'sh!");return}

  const mijoz=document.getElementById('mijozName').value.trim()||"Noma'lum";
  const phone=document.getElementById('mijozPhone').value.trim()||"Ko'rsatilmagan";
  const address=document.getElementById('mijozAddress').value.trim()||"Ko'rsatilmagan";
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  const now=new Date();
  const dateStr=now.toLocaleDateString('uz-UZ')+' '+now.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'});

  let msg = `🛒 *YANGI ZAKAZ #${orderNum}*\n`;
  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `👤 *Mijoz:* ${mijoz}\n`;
  msg += `📞 *Telefon:* ${phone}\n`;
  msg += `📍 *Manzil:* ${address}\n`;
  msg += `🕐 *Vaqt:* ${dateStr}\n`;
  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `📦 *Mahsulotlar:*\n\n`;

  items.forEach((item,i)=>{
    msg += `${i+1}. ${item.emoji} ${item.name}\n`;
    msg += `   ${item.qty} ta × ${(item.price/1000).toFixed(1)}K = *${fmt(item.subtotal)}*\n\n`;
  });

  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `💰 *JAMI: ${fmt(total)}*\n`;
  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `🏪 Nafis Clean`;

  const btn=document.getElementById('sendBtn');
  btn.disabled=true;
  document.getElementById('sendingOverlay').classList.add('open');
  closeCart();

  try {
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        chat_id: CHAT_ID,
        text: msg,
        parse_mode: 'Markdown'
      })
    });
    const data = await res.json();
    document.getElementById('sendingOverlay').classList.remove('open');

    if(data.ok){
      document.getElementById('successMsg').textContent=`#${orderNum} raqamli buyurtma Telegramga yuborildi! 🎉`;
      document.getElementById('successOverlay').classList.add('open');
      orderNum++;
    } else {
      showToast('❌ Xatolik: '+( data.description||'Yuborilmadi'));
      btn.disabled=false;
      openCart();
    }
  } catch(e){
    document.getElementById('sendingOverlay').classList.remove('open');
    showToast('❌ Internet xatoligi!');
    btn.disabled=false;
    openCart();
  }
}

function afterSuccess(){
  document.getElementById('successOverlay').classList.remove('open');
  Object.keys(cart).forEach(id=>{delete cart[id];updateCardUI(+id)});
  cart={};
  updateCartUI();
  document.getElementById('mijozName').value='';
  document.getElementById('mijozPhone').value='';
  document.getElementById('mijozAddress').value='';
  document.getElementById('sendBtn').disabled=false;
}

function filterCat(cat,el){currentCat=cat;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderGrid()}
function searchProducts(q){searchQuery=q;renderGrid()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

renderGrid();updateCartUI();
</script>
</body>
</html>
